<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ayushi Shikha | Product & GTM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #030712;
    --surface: #0f172a;
    --surface-hover: #1e293b;
    --border: #1e293b;
    --border-hover: #334155;
    --accent: #00ffca; 
    --accent-glow: rgba(0, 255, 202, 0.4);
    --accent-alt: #10b981;
    --text: #f8fafc;
    --muted: #94a3b8;
    --tag-bg: rgba(0, 255, 202, 0.08);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .bg-glow {
    position: fixed;
    top: -20%;
    left: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.12) 0%, rgba(0,0,0,0) 70%);
    filter: blur(80px);
    z-index: -1;
    pointer-events: none;
  }

  .bg-glow-2 {
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(0, 255, 202, 0.08) 0%, rgba(0,0,0,0) 70%);
    filter: blur(80px);
    z-index: -1;
    pointer-events: none;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 5vw;
    background: rgba(3, 7, 18, 0.7);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.3s ease;
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    transition: all 0.3s ease;
  }

  .nav-links a:hover {
    color: var(--text);
  }

  .nav-social {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: all 0.3s ease;
  }

  .nav-social:hover {
    color: var(--accent);
    transform: translateY(-2px);
  }

  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 5vw 80px;
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
  }

  .hero-label {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    padding: 6px 16px;
    border: 1px solid rgba(0,255,202,0.2);
    border-radius: 100px;
    background: rgba(0,255,202,0.05);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(50px, 7vw, 100px);
    font-weight: 500;
    line-height: 1.1;
    margin-bottom: 28px;
    letter-spacing: -0.02em;
  }

  h1 span.italic {
    font-style: italic;
    color: var(--muted);
  }

  .hero-desc {
    max-width: 600px;
    font-size: 16px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 40px;
  }

  .hero-cta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 28px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    border-radius: 8px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn-primary {
    background: var(--text);
    color: var(--bg);
  }

  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255,255,255,0.2);
    background: var(--accent);
  }

  .btn-ghost {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    background: rgba(0, 255, 202, 0.05);
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,255,202,0.1);
  }

  .btn-ghost svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  @media (max-width: 768px) {
    .nav-links {
      display: none;
    }
  }
</style>
</head>

<body>

<div class="bg-glow"></div>
<div class="bg-glow-2"></div>

<nav>
  <a href="#hero" class="nav-logo">AS</a>

  <ul class="nav-links">
    <li><a href="#stack">Expertise</a></li>
    <li><a href="#projects">Work</a></li>
    <li><a href="#contact">Contact</a></li>

    <li>
      <a href="https://www.linkedin.com/in/ayushi-s-06ab54279/" target="_blank" class="nav-social" aria-label="LinkedIn">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
          <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854V1.146zm4.943 12.248V6.169H3.337v7.225h1.606zm-1.56-8.192c.571 0 1.026-.455 1.026-1.026 0-.571-.455-1.026-1.026-1.026-.571 0-1.026.455-1.026 1.026 0 .571.455 1.026 1.026 1.026zM13.31 13.394V8.835c0-2.441-1.303-3.576-3.04-3.576-1.402 0-2.029.771-2.381 1.319h-.033V6.169H6.264c.021.453 0 7.225 0 7.225h1.606V9.35c0-.427.03-.854.156-1.159.344-.854 1.125-1.738 2.438-1.738 1.72 0 2.408 1.311 2.408 3.232v3.71h1.606z"/>
        </svg>
      </a>
    </li>
  </ul>
</nav>

<div id="hero">
  <div class="hero-label">Product &amp; GTM</div>

  <h1>Ayushi <span class="italic">Shikha</span></h1>

  <p class="hero-desc">
    IIT Roorkee '24. I sit at the intersection of product thinking and go-to-market execution,
    translating user insight into revenue outcomes. Specializing in 0→1 automated systems
    and agentic workflows.
  </p>

  <div class="hero-cta">
    <a href="#contact" class="btn btn-primary">Let's Talk</a>

    <a href="https://www.linkedin.com/in/ayushi-s-06ab54279/" target="_blank" class="btn btn-ghost">
      <svg fill="currentColor" viewBox="0 0 16 16">
        <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854V1.146zm4.943 12.248V6.169H3.337v7.225h1.606zm-1.56-8.192c.571 0 1.026-.455 1.026-1.026 0-.571-.455-1.026-1.026-1.026-.571 0-1.026.455-1.026 1.026 0 .571.455 1.026 1.026 1.026zM13.31 13.394V8.835c0-2.441-1.303-3.576-3.04-3.576-1.402 0-2.029.771-2.381 1.319h-.033V6.169H6.264c.021.453 0 7.225 0 7.225h1.606V9.35c0-.427.03-.854.156-1.159.344-.854 1.125-1.738 2.438-1.738 1.72 0 2.408 1.311 2.408 3.232v3.71h1.606z"/>
      </svg>

      Connect on LinkedIn
    </a>
  </div>
</div>

<script>
  const handleOnMouseMove = e => {
    const { currentTarget: target } = e;

    const rect = target.getBoundingClientRect(),
          x = e.clientX - rect.left,
          y = e.clientY - rect.top;

    target.style.setProperty("--mouse-x", `${x}px`);
    target.style.setProperty("--mouse-y", `${y}px`);
  };

  for (const card of document.querySelectorAll('.card')) {
    card.onmousemove = e => handleOnMouseMove(e);
  }
</script>

</body>
</html>
