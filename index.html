<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ayushi Shikha | Product & GTM</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg: #030712;
    --surface: #0f172a;
    --surface-hover: #1e293b;
    --border: #1e293b;
    --border-hover: #334155;
    --accent: #00ffca;
    --accent-glow: rgba(0, 255, 202, 0.4);
    --accent-alt: #10b981;
    --text: #f8fafc;
    --muted: #94a3b8;
    --tag-bg: rgba(0, 255, 202, 0.08);
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── BACKGROUND GLOW ── */

  .bg-glow {
    position: fixed;
    top: -20%;
    left: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.12) 0%, rgba(0,0,0,0) 70%);
    filter: blur(80px);
    z-index: -1;
    pointer-events: none;
  }

  .bg-glow-2 {
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(0, 255, 202, 0.08) 0%, rgba(0,0,0,0) 70%);
    filter: blur(80px);
    z-index: -1;
    pointer-events: none;
  }

  /* ── NAV ── */

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 5vw;
    background: rgba(3, 7, 18, 0.7);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.3s ease;
  }

  .nav-logo:hover {
    color: var(--accent);
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    transition: all 0.3s ease;
  }

  .nav-links a:hover {
    color: var(--text);
  }

  .nav-social {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: all 0.3s ease;
  }

  .nav-social:hover {
    color: var(--accent);
    transform: translateY(-2px);
  }

  /* ── HERO ── */

  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 5vw 80px;
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
  }

  .hero-label {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    padding: 6px 16px;
    border: 1px solid rgba(0,255,202,0.2);
    border-radius: 100px;
    background: rgba(0,255,202,0.05);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(50px, 7vw, 100px);
    font-weight: 500;
    line-height: 1.1;
    margin-bottom: 28px;
    letter-spacing: -0.02em;
  }

  h1 span.italic {
    font-style: italic;
    color: var(--muted);
  }

  .hero-desc {
    max-width: 600px;
    font-size: 16px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 40px;
  }

  .hero-cta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 28px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    border-radius: 8px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn-primary {
    background: var(--text);
    color: var(--bg);
  }

  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255,255,255,0.2);
    background: var(--accent);
  }

  .btn-ghost {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    background: rgba(0, 255, 202, 0.05);
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,255,202,0.1);
  }

  .btn-ghost svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  /* ── SECTIONS ── */

  .section-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 100px 5vw;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 60px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
  }

  /* ── GRID ── */

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px;
    border-radius: 16px;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(
      800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
      rgba(255,255,255,0.06),
      transparent 40%
    );
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover::before {
    opacity: 1;
  }

  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  .icon-box {
    width: 48px;
    height: 48px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    color: var(--text);
    transition: all 0.4s ease;
  }

  .card:hover .icon-box {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 12px;
    color: var(--text);
  }

  .card-desc {
    font-size: 14.5px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.7;
  }

  #projects .card-desc {
    margin-bottom: 0;
  }

  .stack-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .tag {
    font-size: 12.5px;
    font-weight: 500;
    padding: 6px 14px;
    background: var(--tag-bg);
    border: 1px solid rgba(0, 255, 202, 0.15);
    border-radius: 100px;
    color: var(--accent);
    transition: all 0.3s ease;
    cursor: default;
  }

  .card:hover .tag {
    background: rgba(0, 255, 202, 0.15);
    border-color: rgba(0, 255, 202, 0.4);
  }

  .tag:hover {
    transform: scale(1.05);
    background: var(--accent) !important;
    color: var(--bg) !important;
    box-shadow: 0 4px 15px var(--accent-glow);
  }

  /* ── CONTACT ── */

  #contact {
    position: relative;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .contact-inner {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 60px;
    flex-wrap: wrap;
    background: var(--surface);
    padding: 60px;
    border-radius: 24px;
    border: 1px solid var(--border);
  }

  .contact-left h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1.1;
    font-weight: 500;
    margin-bottom: 20px;
  }

  .contact-left h2 span {
    color: var(--text);
    font-style: normal;
  }

  .contact-right {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 300px;
  }

  .contact-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    color: var(--text);
    padding: 20px 24px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    transition: all 0.3s ease;
  }

  .contact-link:hover {
    border-color: var(--accent);
    background: rgba(0,255,202,0.05);
    padding-left: 32px;
  }

  footer {
    text-align: center;
    padding: 40px;
    font-size: 13px;
    color: var(--muted);
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  @media (max-width: 768px) {
    .nav-links {
      display: none;
    }

    .contact-inner {
      padding: 40px 24px;
      flex-direction: column;
      gap: 40px;
    }

    .contact-right {
      min-width: 100%;
      width: 100%;
    }
  }
</style>
</head>

<script>
  const handleOnMouseMove = e => {
    const { currentTarget: target } = e;

    const rect = target.getBoundingClientRect(),
          x = e.clientX - rect.left,
          y = e.clientY - rect.top;

    target.style.setProperty("--mouse-x", `${x}px`);
    target.style.setProperty("--mouse-y", `${y}px`);
  };

  for (const card of document.querySelectorAll('.card')) {
    card.onmousemove = e => handleOnMouseMove(e);
  }
</script>
